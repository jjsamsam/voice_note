name: Build Voice Note

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.1.0 등 태그 push 시 자동 빌드
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: VoiceNote-macOS
            binary_name: VoiceNote
          - os: windows-latest
            artifact_name: VoiceNote-Windows
            binary_name: VoiceNote.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 ffmpeg 설치 (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: 🔧 ffmpeg 설치 (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🏗️ PyInstaller 빌드
        run: pyinstaller voice_note.spec

      - name: 📁 빌드 결과 확인
        run: |
          ls -la dist/
        shell: bash

      - name: ⬆️ 빌드 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.binary_name }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: 📥 macOS 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: VoiceNote-macOS
          path: artifacts/macos

      - name: 📥 Windows 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: VoiceNote-Windows
          path: artifacts/windows

      - name: 📦 릴리스 파일 준비
        run: |
          cd artifacts/macos && zip -r ../../VoiceNote-macOS.zip . && cd ../..
          cd artifacts/windows && zip -r ../../VoiceNote-Windows.zip . && cd ../..

      - name: 🚀 GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VoiceNote-macOS.zip
            VoiceNote-Windows.zip
          body: |
            ## Voice Note 🎙

            ### 다운로드
            - **macOS**: `VoiceNote-macOS.zip` 다운로드 → 압축 해제 → `VoiceNote` 더블 클릭
            - **Windows**: `VoiceNote-Windows.zip` 다운로드 → 압축 해제 → `VoiceNote.exe` 더블 클릭

            ### 기능
            - 🎤 음성 녹음 (WAV/MP3/MP4 저장)
            - 🔊 음성 → 텍스트 변환 (OpenAI Whisper)
            - 🌐 다국어 번역 (Google Translate)

            ### 참고
            - 첫 실행 시 Whisper 모델 다운로드로 시간이 걸릴 수 있습니다
            - ffmpeg이 실행 파일에 포함되어 있어 별도 설치가 필요 없습니다
          generate_release_notes: true
