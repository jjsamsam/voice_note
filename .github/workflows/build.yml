name: Build Voice Note

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v1.1.0 등 태그 push 시 자동 빌드
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: VoiceNote-macOS
          - os: windows-latest
            artifact_name: VoiceNote-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 ffmpeg 설치 (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: 🔧 ffmpeg 설치 (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: 🔧 Visual C++ Redistributable (Windows)
        if: runner.os == 'Windows'
        run: choco install vcredist140 -y

      - name: 📦 의존성 설치 (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📦 의존성 설치 (Windows - CPU-only PyTorch)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu --no-cache-dir
          pip install -r requirements.txt

      - name: 🔎 Torch 번들 진단
        run: |
          python -c "import os, torch; print('torch', torch.__version__); print(torch.__file__); lib = os.path.join(os.path.dirname(torch.__file__), 'lib'); print('torch/lib:', sorted(os.listdir(lib)) if os.path.isdir(lib) else 'missing')"

      - name: 🏗️ PyInstaller 빌드
        run: pyinstaller voice_note.spec

      - name: 📁 빌드 결과 확인
        run: ls -la dist/VoiceNote/
        shell: bash

      - name: 📦 배포 파일 압축 (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../VoiceNote-macOS.zip VoiceNote/

      - name: 📦 배포 파일 압축 (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\VoiceNote\* -DestinationPath VoiceNote-Windows.zip

      - name: ⬆️ 빌드 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: 📥 macOS 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: VoiceNote-macOS
          path: artifacts/

      - name: 📥 Windows 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: VoiceNote-Windows
          path: artifacts/

      - name: 🚀 GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/VoiceNote-macOS.zip
            artifacts/VoiceNote-Windows.zip
          body: |
            ## Voice Note 🎙

            ### 📥 다운로드 및 실행 방법

            #### macOS
            1. `VoiceNote-macOS.zip` 다운로드
            2. 압축 해제
            3. `VoiceNote` 폴더 안의 `VoiceNote` 파일 더블 클릭

            #### Windows
            1. `VoiceNote-Windows.zip` 다운로드
            2. 압축 해제
            3. `VoiceNote.exe` 더블 클릭

            > ⚠️ Windows에서 "보호된 앱" 경고가 나타나면 "추가 정보" → "실행"을 클릭하세요

            ### 기능
            - 🎤 음성 녹음 (WAV/MP3/MP4 저장)
            - 🔊 음성 → 텍스트 변환 (OpenAI Whisper)
            - 🌐 다국어 번역 (Google Translate)
            - 📋 텍스트 복사

            ### 참고
            - 첫 실행 시 Whisper 모델 다운로드에 시간이 걸릴 수 있습니다 (인터넷 필요)
            - ffmpeg이 포함되어 있어 별도 설치가 필요 없습니다
          generate_release_notes: true
